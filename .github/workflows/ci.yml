name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Python (lint + type-check + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic1 ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff mypy

      - name: Lint with ruff
        run: ruff check app/ --select=E,F,W --ignore=E501,E402,W291,W292,W293

      - name: Type-check with mypy
        run: mypy app/ --ignore-missing-imports --no-strict-optional --allow-untyped-defs

      - name: Run tests with pytest
        env:
          AUTH_DISABLED: "true"
        run: pytest tests/ -x -q --tb=short

  frontend:
    name: Next.js (lint + type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Type-check with TypeScript
        run: npm run typecheck
