name: Desktop Smoke (CI Gate)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  desktop-smoke:
    name: Desktop SQLite-mode smoke harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic1 ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run desktop smoke harness
        env:
          AUTH_DISABLED: "true"
          DATA_BACKEND: "sqlite"
          SUPABASE_URL: ""
          SUPABASE_KEY: ""
        run: python scripts/desktop-smoke-test.py
